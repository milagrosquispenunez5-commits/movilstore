<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - MOVIL STORE</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background:
                linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url("img/tienda2.jpeg");

            background-size: cover;
            background-position: center;
        }

        .container {
            width: 350px;
            background: rgba(17, 24, 39, 0.95);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(0, 195, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            width: 120px;
            display: block;
            margin: auto;
            margin-bottom: 15px;
        }

        h2 {
            text-align: center;
            color: #00c3ff;
            margin-bottom: 10px;
        }

        .texto {
            text-align: center;
            color: #ccc;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 15px;
        }

        .password-box {
            position: relative;
        }

        .password-box span {
            position: absolute;
            right: 15px;
            top: 22px;
            cursor: pointer;
            color: black;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #00c3ff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }

        button:hover {
            background: #009ed1;
        }

        .link {
            text-align: center;
            margin-top: 18px;
            color: #ccc;
        }

        .link a {
            color: #00c3ff;
            cursor: pointer;
            text-decoration: none;
        }

        .oculto {
            display: none;
        }

        #mensaje {
            text-align: center;
            margin-top: 15px;
            color: red;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <div class="container">

        <!-- LOGIN -->
        <div id="login">

            <img src="img/logo.png" class="logo">

            <h2>Iniciar Sesión</h2>

            <p class="texto">
                Bienvenido a MOVIL STORE
            </p>

            <input type="text" id="usuarioLogin" placeholder="Usuario">

            <div class="password-box">

                <input type="password" id="passwordLogin" placeholder="Contraseña">

                <span onclick="mostrarPassword('passwordLogin')">
                    👁️
                </span>

            </div>

            <button onclick="login()">
                Ingresar
            </button>

            <div class="link">

                ¿No tienes cuenta?

                <a onclick="mostrarRegistro()">
                    Crear cuenta
                </a>

            </div>

        </div>

        <!-- REGISTRO -->
        <div id="registro" class="oculto">

            <img src="img/logo.png" class="logo">

            <h2>Crear Cuenta</h2>

            <p class="texto">
                Regístrate para ingresar
            </p>

            <input type="text" id="nuevoUsuario" placeholder="Nuevo usuario">

            <div class="password-box">

                <input type="password" id="nuevoPassword" placeholder="Nueva contraseña">

                <span onclick="mostrarPassword('nuevoPassword')">
                    👁️
                </span>

            </div>

            <button onclick="registrar()">
                Registrarse
            </button>

            <div class="link">

                ¿Ya tienes cuenta?

                <a onclick="mostrarLogin()">
                    Iniciar sesión
                </a>

            </div>

        </div>

        <p id="mensaje"></p>

    </div>

    <script>
        function login() {
            const usuario = document.getElementById("usuarioLogin").value.trim();
            const password = document.getElementById("passwordLogin").value.trim();

            if (!usuario || !password) {
                document.getElementById("mensaje").innerHTML = "Completa todos los campos";
                return;
            }

            const formData = new FormData();
            formData.append("action", "login");
            formData.append("username", usuario);
            formData.append("password", password);

            fetch("api.php", {
                method: "POST",
                body: formData
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        // Guardar sesión en localStorage
                        localStorage.setItem('user_id', data.user_id);
                        localStorage.setItem('username', usuario);
                        window.location.href = "dashboard.html";
                    } else {
                        document.getElementById("mensaje").innerHTML = "❌ " + data.message;
                    }
                })
                .catch(() => {
                    document.getElementById("mensaje").innerHTML = "❌ Error al conectar con el servidor";
                });
        }

        function registrar() {
            const usuario = document.getElementById("nuevoUsuario").value.trim();
            const password = document.getElementById("nuevoPassword").value.trim();

            if (!usuario || !password) {
                alert("Completa todos los campos");
                return;
            }

            if (password.length < 4) {
                alert("La contraseña debe tener mínimo 4 caracteres");
                return;
            }

            const formData = new FormData();
            formData.append("action", "register");
            formData.append("username", usuario);
            formData.append("password", password);

            fetch("api.php", {
                method: "POST",
                body: formData
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert("✅ " + data.message);
                        mostrarLogin();
                    } else {
                        alert("❌ " + data.message);
                    }
                })
                .catch(() => {
                    alert("❌ Error al conectar con el servidor");
                });
        }

        function mostrarRegistro() {
            document.getElementById("login").classList.add("oculto");
            document.getElementById("registro").classList.remove("oculto");
            document.getElementById("mensaje").innerHTML = "";
        }

        function mostrarLogin() {
            document.getElementById("registro").classList.add("oculto");
            document.getElementById("login").classList.remove("oculto");
            document.getElementById("mensaje").innerHTML = "";
        }

        function mostrarPassword(id) {
            let campo = document.getElementById(id);
            campo.type = campo.type === "password" ? "text" : "password";
        }
    </script>

</body>

</html>
