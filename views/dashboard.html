<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - MOVIL STORE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0b1220 0%, #1a2a4a 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #00c3ff;
        }

        .header h1 {
            font-size: 28px;
            color: #00c3ff;
        }

        .user-info {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .username {
            font-size: 14px;
            color: #ccc;
        }

        .logout-btn {
            padding: 10px 20px;
            background: #ff4444;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: #cc0000;
        }

        .add-opinion-section {
            background: rgba(0, 195, 255, 0.1);
            border: 2px solid #00c3ff;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .add-opinion-section h2 {
            color: #00c3ff;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #00c3ff;
            border-radius: 8px;
            background: rgba(11, 18, 32, 0.8);
            color: white;
            font-family: 'Poppins', sans-serif;
            resize: vertical;
            min-height: 100px;
            outline: none;
        }

        textarea:focus {
            border-color: #00d9ff;
            box-shadow: 0 0 10px rgba(0, 195, 255, 0.3);
        }

        .rating-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .star {
            font-size: 28px;
            cursor: pointer;
            transition: 0.3s;
            color: #ccc;
        }

        .star:hover,
        .star.active {
            color: #ffd700;
            transform: scale(1.2);
        }

        .form-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            flex: 1;
        }

        .btn-submit {
            background: #00c3ff;
            color: #0b1220;
        }

        .btn-submit:hover {
            background: #00d9ff;
        }

        .btn-clear {
            background: #444;
            color: white;
        }

        .btn-clear:hover {
            background: #666;
        }

        .opinions-section h2 {
            color: #00c3ff;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .opinion-card {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid #00c3ff;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .opinion-card:hover {
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(0, 195, 255, 0.2);
        }

        .opinion-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .opinion-date {
            color: #999;
            font-size: 12px;
        }

        .opinion-rating {
            color: #ffd700;
            font-size: 16px;
            letter-spacing: 2px;
        }

        .opinion-text {
            color: #ddd;
            line-height: 1.6;
            margin: 10px 0;
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 16px;
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }

        .message.success {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4caf50;
            color: #4caf50;
            display: block;
        }

        .message.error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
            color: #f44336;
            display: block;
        }

        .delete-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.3s;
        }

        .delete-btn:hover {
            background: #cc0000;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Dashboard - MOVIL STORE</h1>
            <div class="user-info">
                <span class="username">Bienvenido, <strong id="usuarioNombre"></strong></span>
                <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
            </div>
        </div>

        <div id="mensaje" class="message"></div>

        <div class="add-opinion-section" id="adminOpinionSection">
            <h2>📝 Tu Opinión (Admin)</h2>
            <form id="opinionForm">
                <div class="form-group">
                    <label for="opinion">Tu Opinión:</label>
                    <textarea id="opinion" name="opinion" placeholder="Cuéntanos tu experiencia con MOVIL STORE..." required></textarea>
                </div>

                <div class="form-group">
                    <label>Calificación:</label>
                    <div class="rating-group">
                        <span class="star" onclick="setRating(1)">★</span>
                        <span class="star" onclick="setRating(2)">★</span>
                        <span class="star" onclick="setRating(3)">★</span>
                        <span class="star" onclick="setRating(4)">★</span>
                        <span class="star" onclick="setRating(5)">★</span>
                    </div>
                </div>

                <div class="form-buttons">
                    <button type="submit" class="btn btn-submit">Enviar Opinión</button>
                    <button type="reset" class="btn btn-clear">Limpiar</button>
                </div>
            </form>
        </div>

        <div class="opinions-section">
            <h2>⭐ Opiniones</h2>
            <div id="opinionsList"></div>
        </div>
    </div>

    <script>
        let selectedRating = 5;
        let usuarioActual = {
            id: null,
            username: null
        };

        // Verificar sesión
        function verificarSesion() {
            let userId = localStorage.getItem('user_id');
            let username = localStorage.getItem('username');

            if (!userId || !username) {
                window.location.href = 'login.html';
                return;
            }

            usuarioActual.id = parseInt(userId);
            usuarioActual.username = username;
            document.getElementById('usuarioNombre').textContent = username;
        }

        function setRating(rating) {
            selectedRating = rating;
            const stars = document.querySelectorAll('.star');
            stars.forEach((star, index) => {
                if (index < rating) {
                    star.classList.add('active');
                } else {
                    star.classList.remove('active');
                }
            });
        }

        function loadOpinions() {
            fetch("api.php?action=get_opinions")
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        let html = '';
                        if (data.data.length === 0) {
                            html = '<div class="empty-message">No hay opiniones para mostrar.</div>';
                        } else {
                            data.data.forEach(op => {
                                let es_cliente = op.tipo === 'cliente';
                                html += `
                                    <div class="opinion-card" data-id="${op.id}" style="border-left-color: ${es_cliente ? '#ff9800' : '#00c3ff'};">
                                        <div class="opinion-header">
                                            <div>
                                                <span class="opinion-rating">${'★'.repeat(op.rating)}</span>
                                                ${es_cliente ? '<span style="color:#ff9800; margin-left:10px; font-size:12px;"> [CLIENTE]</span>' : '<span style="color:#00c3ff; margin-left:10px; font-size:12px;"> [TÚ]</span>'}
                                            </div>
                                            <div>
                                                <span style="color:#ccc; font-size:14px;"><strong>${op.nombre}</strong></span><br>
                                                <span class="opinion-date">${op.fecha}</span>
                                            </div>
                                        </div>
                                        <p class="opinion-text">${op.opinion}</p>
                                    </div>
                                `;
                            });
                        }
                        document.getElementById('opinionsList').innerHTML = html;
                    } else {
                        document.getElementById('opinionsList').innerHTML = '<div class="empty-message">Error al cargar opiniones</div>';
                    }
                })
                .catch(err => {
                    console.error("Error:", err);
                    document.getElementById('opinionsList').innerHTML = '<div class="empty-message">Error al conectar</div>';
                });
        }

        function showMessage(msg, type) {
            const messageDiv = document.getElementById('mensaje');
            messageDiv.textContent = msg;
            messageDiv.className = 'message ' + type;
            setTimeout(() => {
                messageDiv.className = 'message';
            }, 4000);
        }

        function logout() {
            if (confirm('¿Deseas cerrar sesión?')) {
                localStorage.removeItem('user_id');
                localStorage.removeItem('username');
                
                fetch("api.php?action=logout")
                    .then(() => {
                        window.location.href = 'login.html';
                    });
            }
        }

        // Event listener para el formulario
        document.getElementById('opinionForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const opinion = document.getElementById('opinion').value.trim();

            if (!opinion) {
                showMessage('Por favor, escribe una opinión', 'error');
                return;
            }

            const formData = new FormData();
            formData.append("action", "add_opinion_admin");
            formData.append("opinion", opinion);
            formData.append("rating", selectedRating);

            fetch("api.php", {
                method: "POST",
                body: formData
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showMessage('✅ Opinión agregada exitosamente', 'success');
                        document.getElementById('opinionForm').reset();
                        setRating(5);
                        loadOpinions();
                    } else {
                        showMessage('❌ ' + data.message, 'error');
                    }
                })
                .catch(err => {
                    console.error("Error:", err);
                    showMessage('❌ Error al guardar opinión', 'error');
                });
        });

        // Inicializar
        verificarSesion();
        setRating(5);
        loadOpinions();
    </script>
</body>
</html>
