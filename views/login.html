<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - MOVIL STORE</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background:
                linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url("../img/tienda2.jpeg");

            background-size: cover;
            background-position: center;
        }

        .container {
            width: 350px;
            background: rgba(17, 24, 39, 0.95);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(0, 195, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            width: 120px;
            display: block;
            margin: auto;
            margin-bottom: 15px;
        }

        h2 {
            text-align: center;
            color: #00c3ff;
            margin-bottom: 10px;
        }

        .texto {
            text-align: center;
            color: #ccc;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 15px;
        }

        .password-box {
            position: relative;
        }

        .password-box span {
            position: absolute;
            right: 15px;
            top: 22px;
            cursor: pointer;
            color: black;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #00c3ff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }

        button:hover {
            background: #009ed1;
        }

        .link {
            text-align: center;
            margin-top: 18px;
            color: #ccc;
        }

        .link a {
            color: #00c3ff;
            cursor: pointer;
            text-decoration: none;
        }

        .oculto {
            display: none;
        }

        #mensaje {
            text-align: center;
            margin-top: 15px;
            color: red;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <div class="container">

        <!-- LOGIN -->
        <div id="login">

            <img src="../img/logo.png" class="logo">

            <h2>Iniciar Sesión</h2>

            <p class="texto">
                Bienvenido a MOVIL STORE
            </p>

            <form method="POST" action="../controllers/auth.php">

                <input type="hidden" name="action" value="login">

                <input type="text" name="usuario" placeholder="Usuario" required>

                <div class="password-box">

                    <input type="password" name="password" id="passwordLogin" placeholder="Contraseña" required>

                    <span onclick="mostrarPassword('passwordLogin')">
                        👁️
                    </span>

                </div>

                <button type="submit">
                    Ingresar
                </button>

            </form>

            <div class="link">

                ¿No tienes cuenta?

                <a onclick="mostrarRegistro()">
                    Crear cuenta
                </a>

            </div>

        </div>

        <!-- REGISTRO -->
        <div id="registro" class="oculto">

            <img src="../img/logo.png" class="logo">

            <h2>Crear Cuenta</h2>

            <p class="texto">
                Regístrate para ingresar
            </p>

            <form method="POST" action="../controllers/auth.php">

                <input type="hidden" name="action" value="register">

                <input type="text" name="usuario" placeholder="Nuevo usuario" required>

                <div class="password-box">

                    <input type="password" name="password" id="nuevoPassword" placeholder="Nueva contraseña" minlength="4" required>

                    <span onclick="mostrarPassword('nuevoPassword')">
                        👁️
                    </span>

                </div>

                <button type="submit">
                    Registrarse
                </button>

            </form>

            <div class="link">

                ¿Ya tienes cuenta?

                <a onclick="mostrarLogin()">
                    Iniciar sesión
                </a>

            </div>

        </div>

        <p id="mensaje"></p>

    </div>

    <script>
        function mostrarRegistro() {
            document.getElementById("login").classList.add("oculto");
            document.getElementById("registro").classList.remove("oculto");
            document.getElementById("mensaje").innerHTML = "";
        }

        function mostrarLogin() {
            document.getElementById("registro").classList.add("oculto");
            document.getElementById("login").classList.remove("oculto");
            document.getElementById("mensaje").innerHTML = "";
        }

        function mostrarPassword(id) {
            let campo = document.getElementById(id);
            campo.type = campo.type === "password" ? "text" : "password";
        }

        // Mostrar mensajes que auth.php envía por la URL (?error=... / ?ok=... / ?vista=registro)
        const params = new URLSearchParams(window.location.search);
        const mensaje = document.getElementById("mensaje");

        if (params.get("vista") === "registro") {
            document.getElementById("login").classList.add("oculto");
            document.getElementById("registro").classList.remove("oculto");
        }

        if (params.get("error")) {
            mensaje.style.color = "red";
            mensaje.textContent = "❌ " + params.get("error");
        } else if (params.get("ok")) {
            mensaje.style.color = "#00ff88";
            mensaje.textContent = "✅ " + params.get("ok");
        }
    </script>

</body>

</html>
